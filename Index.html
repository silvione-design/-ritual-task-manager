<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritual Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0f1117; --bg2:#181c26; --bg3:#1e2330;
  --border:#2a2f3d; --amber:#f5a623; --red:#e05252; --green:#4caf82; --blue:#5b9cf6;
  --text:#e8eaf0; --text-dim:#8891a8; --text-muted:#4a5068;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif; --radius:6px;
}
body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; -webkit-font-smoothing:antialiased; }
::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
input,select,textarea { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:var(--sans); font-size:14px; padding:9px 12px; width:100%; outline:none; transition:border-color 0.15s; }
input:focus,select:focus,textarea:focus{border-color:var(--amber);}
select option{background:var(--bg2);}
button{cursor:pointer;font-family:var(--sans);}
.btn{border:none;border-radius:var(--radius);font-size:13px;font-weight:500;padding:8px 16px;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.btn-amber{background:var(--amber);color:#000;} .btn-amber:hover{background:#ffb84d;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim);} .btn-ghost:hover{border-color:var(--amber);color:var(--amber);}
.btn-red{background:transparent;border:1px solid var(--red);color:var(--red);} .btn-red:hover{background:var(--red);color:#fff;}
.btn-green{background:var(--green);color:#000;} .btn-green:hover{background:#5fd49a;}
.btn-sm{padding:5px 10px;font-size:12px;}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-family:var(--mono);font-weight:500;}
.tag-pulizie{background:#1a3a4a;color:#5bc0eb;} .tag-haccp{background:#3a1a1a;color:#e05252;}
.tag-manutenzione{background:#2a2a1a;color:#f5a623;} .tag-scorte{background:#1a3a2a;color:#4caf82;}
.tag-amministrazione{background:#2a1a3a;color:#a78bfa;}
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-family:var(--mono);border:1px solid var(--border);color:var(--text-dim);}
label{font-size:12px;color:var(--text-dim);font-weight:500;letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:5px;}
.field{margin-bottom:14px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn 0.15s ease;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:28px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;animation:slideUp 0.2s ease;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.hidden{display:none!important;}
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:56px;gap:16px;}
#topbar-logo{font-family:var(--mono);font-size:12px;letter-spacing:.15em;color:var(--amber);font-weight:600;flex-shrink:0;}
#topbar-nav{display:flex;gap:4px;}
#topbar-right{display:flex;align-items:center;gap:12px;margin-left:auto;}
#current-user-label{font-size:12px;color:var(--text-muted);}
.nav-btn{font-size:13px;padding:5px 14px;background:transparent;color:var(--text-dim);border:none;border-radius:6px;cursor:pointer;transition:all 0.15s;}
.nav-btn.active{background:var(--amber);color:#000;}
#content{max-width:900px;margin:0 auto;padding:28px 20px;}
#filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.filter-btn{font-size:12px;padding:5px 14px;background:var(--bg3);color:var(--text-dim);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all 0.15s;}
.filter-btn.active{background:var(--amber);color:#000;border-color:var(--amber);}
.task-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;transition:border-color 0.15s;margin-bottom:8px;}
.task-card.urgent{border-color:rgba(224,82,82,0.4);}
.task-card.inactive{opacity:.5;}
.task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.task-main{flex:1;min-width:180px;}
.task-name{font-weight:500;margin-bottom:4px;}
.task-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.task-status{text-align:right;min-width:90px;}
.task-actions{display:flex;gap:6px;flex-shrink:0;}
.person-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px;}
.person-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;color:var(--amber);flex-shrink:0;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px 20px;}
.kpi-value{font-size:28px;font-weight:600;font-family:var(--mono);}
.kpi-label{font-size:12px;color:var(--text-muted);margin-top:2px;}
#login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
#login-box{width:100%;max-width:360px;padding:24px;}
#login-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:28px;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 1.5s infinite;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.row-end{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.urgency-box{background:rgba(224,82,82,.07);border:1px solid rgba(224,82,82,.3);border-radius:8px;padding:18px;margin-bottom:20px;}
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cat-bar-bg{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.cat-bar-fill{height:100%;background:var(--amber);border-radius:3px;transition:width .4s;}
.section-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:20px;}
.section-title{font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:14px;}
.freq-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.freq-hint{font-size:11px;color:var(--text-muted);margin-top:6px;font-style:italic;}
.loading{text-align:center;padding:48px;color:var(--text-muted);}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 20px;font-size:13px;z-index:200;animation:slideUp 0.2s ease;}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wrap">
  <div id="login-box">
    <div style="text-align:center;margin-bottom:36px;">
      <div style="font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--text-muted);margin-bottom:6px;">RITUAL BRASILEIRO</div>
      <div style="font-size:22px;font-weight:600;color:var(--amber);">Task Manager</div>
      <div style="width:40px;height:2px;background:var(--amber);margin:10px auto 0;"></div>
    </div>
    <div id="login-card">
      <div class="field"><label>Utente</label>
        <select id="login-user"><option value="silvio">Silvio</option><option value="catia">Catia</option></select>
      </div>
      <div class="field"><label>Password</label>
        <input type="password" id="login-pwd" placeholder="••••••••">
      </div>
      <div id="login-err" style="color:var(--red);font-size:13px;margin-bottom:12px;display:none;"></div>
      <button class="btn btn-amber" style="width:100%;justify-content:center;padding:11px;" onclick="doLogin()">Accedi</button>
    </div>
    <div style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:16px;">Ritual Task Manager v2.0</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div id="topbar">
    <div id="topbar-logo">RITUAL TASK</div>
    <div id="topbar-nav">
      <button class="nav-btn active" onclick="setTab('overview')" id="nav-overview">Overview</button>
      <button class="nav-btn" onclick="setTab('tasks')" id="nav-tasks">Task</button>
      <button class="nav-btn" onclick="setTab('people')" id="nav-people">Persone</button>
      <button class="nav-btn" onclick="setTab('log')" id="nav-log">Log</button>
    </div>
    <div id="topbar-right">
      <button class="btn btn-amber btn-sm hidden" id="btn-add-task" onclick="openTaskModal(null)">+ Task</button>
      <button class="btn btn-ghost btn-sm hidden" id="btn-add-person" onclick="openPersonModal(null)">+ Persona</button>
      <span id="current-user-label"></span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Esci</button>
    </div>
  </div>
  <div id="content">
    <div id="page-content"></div>
  </div>
</div>

<!-- MODAL TASK -->
<div id="modal-task" class="modal-overlay hidden">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-task-title">📋 Nuovo task</div>
    <input type="hidden" id="task-id">
    <input type="hidden" id="task-last-sent">
    <div class="field"><label>Nome procedura</label><input id="task-name" placeholder="es. Pulizia filtri cappa"></div>
    <div class="two-col">
      <div class="field"><label>Categoria</label>
        <select id="task-category">
          <option>Pulizie</option><option>HACCP</option><option>Manutenzione</option><option>Scorte</option><option>Amministrazione</option>
        </select>
      </div>
      <div class="field"><label>Orario reminder</label>
        <input type="time" id="task-ora" value="09:00">
      </div>
    </div>
    <div class="field"><label>Tipo frequenza</label>
      <select id="task-freq-type" onchange="updateFreqUI()">
        <option value="giorni">Ogni N giorni</option>
        <option value="settimane">Ogni N settimane</option>
        <option value="mesi">Ogni N mesi</option>
        <option value="giorno-fisso-mese">Giorno fisso del mese</option>
        <option value="giorno-settimana">Ogni settimana — giorno fisso</option>
        <option value="giorno-settimana-n">Ogni N settimane — giorno fisso</option>
      </select>
    </div>
    <div class="field" id="fb-giorni"><label>Ogni quanti giorni</label><input type="number" id="fv-giorni" min="1" value="7"></div>
    <div class="field hidden" id="fb-settimane"><label>Ogni quante settimane</label><input type="number" id="fv-settimane" min="1" value="1"></div>
    <div class="field hidden" id="fb-mesi"><label>Ogni quanti mesi</label><input type="number" id="fv-mesi" min="1" value="1"></div>
    <div class="field hidden" id="fb-giorno-mese">
      <label>Giorno del mese (1–28)</label>
      <input type="number" id="fv-giorno-mese" min="1" max="28" value="4">
      <div class="freq-hint">Max 28 per evitare problemi a febbraio.</div>
    </div>
    <div class="field hidden" id="fb-giorno-sett">
      <label>Giorno della settimana</label>
      <select id="fv-giorno-sett">
        <option value="1">Lunedì</option><option value="2">Martedì</option><option value="3">Mercoledì</option>
        <option value="4">Giovedì</option><option value="5">Venerdì</option><option value="6">Sabato</option>
      </select>
    </div>
    <div class="field hidden" id="fb-giorno-sett-n">
      <label>Ogni N settimane — giorno</label>
      <div class="freq-row">
        <span style="font-size:13px;color:var(--text-dim);white-space:nowrap;">Ogni</span>
        <input type="number" id="fv-sett-n" min="1" value="2" style="width:64px;flex-shrink:0;">
        <span style="font-size:13px;color:var(--text-dim);white-space:nowrap;">settimane di</span>
        <select id="fv-giorno-sett-n" style="flex:1;">
          <option value="1">Lunedì</option><option value="2">Martedì</option><option value="3">Mercoledì</option>
          <option value="4">Giovedì</option><option value="5">Venerdì</option><option value="6">Sabato</option>
        </select>
      </div>
    </div>
    <div class="two-col">
      <div class="field"><label>Responsabile primario</label><select id="task-primary"></select></div>
      <div class="field"><label>Backup (se assente)</label><select id="task-backup"></select></div>
    </div>
    <div class="field"><label>Note (opzionale)</label><textarea id="task-note" rows="2" placeholder="Istruzioni brevi..."></textarea></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">
      <input type="checkbox" id="task-active" style="width:auto;" checked>
      <label for="task-active" style="text-transform:none;margin:0;cursor:pointer;">Task attivo</label>
    </div>
    <div class="row-end">
      <button class="btn btn-ghost" onclick="closeModal('modal-task')">Annulla</button>
      <button class="btn btn-amber" onclick="saveTask()">Salva</button>
    </div>
  </div>
</div>

<!-- MODAL PERSONA -->
<div id="modal-person" class="modal-overlay hidden">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-person-title">👤 Nuova persona</div>
    <input type="hidden" id="person-id">
    <div class="field"><label>Nome</label><input id="person-name" placeholder="es. Marco"></div>
    <div class="two-col">
      <div class="field"><label>WhatsApp</label><input id="person-whatsapp" placeholder="+39 333 1234567"></div>
      <div class="field"><label>Email</label><input id="person-email" placeholder="nome@esempio.it"></div>
    </div>
    <div class="row-end">
      <button class="btn btn-ghost" onclick="closeModal('modal-person')">Annulla</button>
      <button class="btn btn-amber" onclick="savePerson()">Salva</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let currentUser=null, currentTab='overview', activeFilter='tutti', activeCat='tutte';
let tasks=[], people=[], config={};
let loading=false;

const DSET=['','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];

// ── API ──
function api(fn, ...args) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(r => resolve(r))
      .withFailureHandler(e => reject(e))
      [fn](...args);
  });
}

// ── LOGIN ──
document.getElementById('login-pwd').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const user = document.getElementById('login-user').value;
  const pwd  = document.getElementById('login-pwd').value;
  const err  = document.getElementById('login-err');
  try {
    const result = await api('apiLogin', user, pwd);
    if (result === 'ok') {
      currentUser = user;
      err.style.display = 'none';
      document.getElementById('login-wrap').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('current-user-label').textContent = user === 'silvio' ? 'Silvio' : 'Catia';
      await loadAll();
      setTab('overview');
    } else {
      err.textContent = 'Password errata.';
      err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = 'Errore di connessione.';
    err.style.display = 'block';
  }
}

function doLogout() {
  currentUser = null;
  document.getElementById('login-wrap').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-pwd').value = '';
}

// ── LOAD DATA ──
async function loadAll() {
  showLoading();
  try {
    const raw = await api('apiGetAll');
    const data = JSON.parse(raw);
    tasks   = data.tasks.map(t => ({...t, ultimoInvio: t.ultimoInvio ? new Date(t.ultimoInvio) : null}));
    people  = data.people;
    config  = data.config;
  } catch(e) {
    showToast('Errore caricamento dati', 'err');
  }
  hideLoading();
}

function showLoading() {
  document.getElementById('page-content').innerHTML = `<div class="loading"><div class="spinner"></div><br>Caricamento...</div>`;
}
function hideLoading() { }

// ── TABS ──
function setTab(tab) {
  currentTab = tab;
  ['overview','tasks','people','log'].forEach(t => {
    const nav = document.getElementById('nav-'+t);
    if(nav) nav.classList.toggle('active', t===tab);
  });
  const btnTask = document.getElementById('btn-add-task');
  const btnPerson = document.getElementById('btn-add-person');
  if(btnTask) btnTask.classList.toggle('hidden', tab!=='tasks');
  if(btnPerson) btnPerson.classList.toggle('hidden', tab!=='people');
  renderTab(tab);
}

function renderTab(tab) {
  if(tab==='overview') renderOverview();
  if(tab==='tasks')    renderTasks();
  if(tab==='people')   renderPeople();
  if(tab==='log')      renderLog();
  updateNavBadge();
}

function updateNavBadge() {
  const n = tasks.filter(t => t.attivo && daysUntil(t) <= 0).length;
  document.getElementById('nav-tasks').textContent = n > 0 ? `Task (${n})` : 'Task';
}

// ── FREQ ──
function formatFreq(t) {
  switch(t.freqType) {
    case 'giorni':            return t.freqValue===1?'ogni giorno':`ogni ${t.freqValue} giorni`;
    case 'settimane':         return t.freqValue===1?'ogni settimana':`ogni ${t.freqValue} settimane`;
    case 'mesi':              return t.freqValue===1?'ogni mese':`ogni ${t.freqValue} mesi`;
    case 'giorno-fisso-mese': return `il ${t.freqGiornoMese} di ogni mese`;
    case 'giorno-settimana':  return `ogni ${DSET[t.freqGiornoSett]}`;
    case 'giorno-settimana-n':return `ogni ${t.freqValue} sett. — ${DSET[t.freqGiornoSett]}`;
    default: return '';
  }
}

function nextDue(t) {
  const now = new Date(); now.setHours(0,0,0,0);
  switch(t.freqType) {
    case 'giorni': {
      if(!t.ultimoInvio) return now;
      const d=new Date(t.ultimoInvio);d.setHours(0,0,0,0);d.setDate(d.getDate()+t.freqValue);return d;
    }
    case 'settimane': {
      if(!t.ultimoInvio) return now;
      const d=new Date(t.ultimoInvio);d.setHours(0,0,0,0);d.setDate(d.getDate()+t.freqValue*7);return d;
    }
    case 'mesi': {
      if(!t.ultimoInvio) return now;
      const d=new Date(t.ultimoInvio);d.setHours(0,0,0,0);d.setMonth(d.getMonth()+t.freqValue);return d;
    }
    case 'giorno-fisso-mese': {
      const target=new Date(now.getFullYear(),now.getMonth(),t.freqGiornoMese);
      if(t.ultimoInvio){
        const last=new Date(t.ultimoInvio);last.setHours(0,0,0,0);
        const lt=new Date(last.getFullYear(),last.getMonth(),t.freqGiornoMese);
        if(last>=lt){return new Date(last.getFullYear(),last.getMonth()+1,t.freqGiornoMese);}
      }
      if(target<now)target.setMonth(target.getMonth()+1);
      return target;
    }
    case 'giorno-settimana': {
      const td=t.freqGiornoSett;
      const nd=now.getDay()===0?7:now.getDay();
      let da=td-nd;if(da<0)da+=7;
      if(da===0&&t.ultimoInvio){const last=new Date(t.ultimoInvio);last.setHours(0,0,0,0);if(last.getTime()===now.getTime())da=7;}
      const next=new Date(now);next.setDate(now.getDate()+da);return next;
    }
    case 'giorno-settimana-n': {
      const td=t.freqGiornoSett;
      if(!t.ultimoInvio){const nd=now.getDay()===0?7:now.getDay();let da=td-nd;if(da<0)da+=7;const next=new Date(now);next.setDate(now.getDate()+da);return next;}
      const last=new Date(t.ultimoInvio);last.setHours(0,0,0,0);
      const next=new Date(last);next.setDate(next.getDate()+t.freqValue*7);
      const nd2=next.getDay()===0?7:next.getDay();const adj=td-nd2;if(adj!==0)next.setDate(next.getDate()+adj);
      return next;
    }
    default: return now;
  }
}

function daysUntil(t) {
  const now=new Date();now.setHours(0,0,0,0);
  const due=nextDue(t);due.setHours(0,0,0,0);
  return Math.ceil((due-now)/86400000);
}

function formatDate(v) {
  if(!v) return '—';
  return new Date(v).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function tagClass(c) { return 'tag tag-'+c.toLowerCase().replace(/\s+/g,''); }
function uid() { return Math.random().toString(36).slice(2,10); }

function statusHtml(t) {
  if(!t.attivo) return`<span style="color:var(--text-muted);font-size:12px;">Disattivo</span>`;
  const d=daysUntil(t);
  if(d<0)  return`<span style="color:var(--red);font-size:12px;font-family:var(--mono);">⚠ Scaduto ${Math.abs(d)}g fa</span>`;
  if(d===0)return`<span style="color:var(--amber);font-size:12px;font-family:var(--mono);" class="pulse">● Oggi</span>`;
  if(d<=3) return`<span style="color:var(--amber);font-size:12px;font-family:var(--mono);">In ${d}g</span>`;
  return`<span style="color:var(--text-muted);font-size:12px;font-family:var(--mono);">In ${d}g</span>`;
}
function dotColor(t) {
  if(!t.attivo)return'var(--text-muted)';
  const d=daysUntil(t);
  if(d<0)return'var(--red)';if(d===0||d<=3)return'var(--amber)';return'var(--green)';
}

// ── OVERVIEW ──
function renderOverview() {
  const urgent=tasks.filter(t=>t.attivo&&daysUntil(t)<=0);
  const soon=tasks.filter(t=>t.attivo&&daysUntil(t)>0&&daysUntil(t)<=7);
  const cats=['Pulizie','HACCP','Manutenzione','Scorte','Amministrazione'];
  let html=`<div class="kpi-grid">
    ${kpi('Task totali',tasks.length,'var(--text)')}
    ${kpi('Attivi',tasks.filter(t=>t.attivo).length,'var(--green)')}
    ${kpi('Scaduti',urgent.length,urgent.length>0?'var(--red)':'var(--text-muted)')}
    ${kpi('Entro 7 giorni',soon.length,soon.length>0?'var(--amber)':'var(--text-muted)')}
    ${kpi('Persone',people.length,'var(--blue)')}
  </div>`;
  if(urgent.length>0){
    html+=`<div class="urgency-box"><div style="font-size:13px;font-weight:600;color:var(--red);margin-bottom:12px;">⚠ Da inviare subito</div>`;
    urgent.forEach(t=>{
      const p=people.find(x=>x.id===t.primaryId);
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
        <span>${t.nome}</span><div style="display:flex;gap:8px;align-items:center;">${p?`<span style="font-size:12px;color:var(--text-dim);">${p.nome}</span>`:''} ${statusHtml(t)}</div>
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`<div class="section-box"><div class="section-title">Task per categoria</div>`;
  cats.forEach(cat=>{
    const count=tasks.filter(t=>t.categoria===cat&&t.attivo).length;
    const pct=tasks.length>0?(count/tasks.length*100):0;
    html+=`<div class="cat-row"><span class="${tagClass(cat)}">${cat}</span>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
      <span style="font-size:12px;font-family:var(--mono);color:var(--text-muted);width:20px;text-align:right;">${count}</span>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('page-content').innerHTML=html;
}
function kpi(label,value,color){return`<div class="kpi-card"><div class="kpi-value" style="color:${color};">${value}</div><div class="kpi-label">${label}</div></div>`;}

// ── TASKS ──
function renderTasks() {
  const sorted=[...tasks].sort((a,b)=>daysUntil(a)-daysUntil(b));
  const filtered=sorted.filter(t=>{
    if(activeFilter==='scaduti'&&daysUntil(t)>=0)return false;
    if(activeFilter==='oggi'&&daysUntil(t)!==0)return false;
    if(activeFilter==='prossimi'&&(daysUntil(t)<0||daysUntil(t)>7))return false;
    if(activeFilter==='attivi'&&!t.attivo)return false;
    if(activeCat!=='tutte'&&t.categoria!==activeCat)return false;
    return true;
  });
  const sN=tasks.filter(t=>t.attivo&&daysUntil(t)<=0).length;
  const oN=tasks.filter(t=>t.attivo&&daysUntil(t)===0).length;
  const flist=[{key:'tutti',label:'Tutti'},{key:'scaduti',label:`Scaduti${sN>0?' ('+sN+')':''}`},{key:'oggi',label:`Oggi${oN>0?' ('+oN+')':''}`},{key:'prossimi',label:'Prossimi 7g'},{key:'attivi',label:'Attivi'}];
  let html=`<div id="filter-bar">`;
  flist.forEach(f=>html+=`<button class="filter-btn${activeFilter===f.key?' active':''}" onclick="setFilter('${f.key}')">${f.label}</button>`);
  html+=`<select onchange="setCat(this.value)" style="width:auto;font-size:12px;padding:5px 12px;">
    <option value="tutte"${activeCat==='tutte'?' selected':''}>Tutte le categorie</option>
    ${['Pulizie','HACCP','Manutenzione','Scorte','Amministrazione'].map(c=>`<option value="${c}"${activeCat===c?' selected':''}>${c}</option>`).join('')}
  </select></div><div id="task-list">`;
  if(!filtered.length)html+=`<div style="text-align:center;padding:48px;color:var(--text-muted);">Nessun task trovato</div>`;
  filtered.forEach(t=>{
    const p=people.find(x=>x.id===t.primaryId);
    const bk=people.find(x=>x.id===t.backupId);
    const d=daysUntil(t);
    html+=`<div class="task-card${t.attivo&&d<=0?' urgent':''}${!t.attivo?' inactive':''}">
      <div class="task-dot" style="background:${dotColor(t)};"></div>
      <div class="task-main">
        <div class="task-name">${t.nome}</div>
        <div class="task-meta">
          <span class="${tagClass(t.categoria)}">${t.categoria}</span>
          <span class="chip">${formatFreq(t)}</span>
          <span class="chip">🕐 ${t.oraInvio||'09:00'}</span>
          ${p?`<span style="font-size:12px;color:var(--text-dim);">→ ${p.nome}${bk?' / '+bk.nome:''}</span>`:''}
        </div>
      </div>
      <div class="task-status">${statusHtml(t)}<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${t.ultimoInvio?'Inviato: '+formatDate(t.ultimoInvio):'Mai inviato'}</div></div>
      <div class="task-actions">
        <button class="btn btn-ghost btn-sm" onclick="openTaskModal('${t.id}')">✏</button>
        <button class="btn btn-red btn-sm" onclick="deleteTask('${t.id}')">✕</button>
      </div>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('page-content').innerHTML=html;
}
function setFilter(f){activeFilter=f;renderTasks();}
function setCat(c){activeCat=c;renderTasks();}

// ── PEOPLE ──
function renderPeople() {
  let html='';
  if(!people.length)html=`<div style="text-align:center;padding:48px;color:var(--text-muted);">Nessuna persona. Clicca + Persona per aggiungere.</div>`;
  people.forEach(p=>{
    html+=`<div class="person-card">
      <div class="person-avatar">${p.nome[0]}</div>
      <div style="flex:1;"><div style="font-weight:600;">${p.nome}</div>
        <div style="font-size:12px;color:var(--text-dim);">💬 ${p.whatsapp||'—'} &nbsp;·&nbsp; ✉ ${p.email||'—'}</div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-ghost btn-sm" onclick="openPersonModal('${p.id}')">✏ Modifica</button>
        <button class="btn btn-red btn-sm" onclick="deletePerson('${p.id}')">✕</button>
      </div>
    </div>`;
  });
  document.getElementById('page-content').innerHTML=html;
}

// ── LOG ──
function renderLog() {
  document.getElementById('page-content').innerHTML=`<div class="loading"><div class="spinner"></div><br>Caricamento log...</div>`;
  // Log is on Sheets — redirect user
  document.getElementById('page-content').innerHTML=`<div class="section-box">
    <div class="section-title">📋 Log invii email</div>
    <p style="color:var(--text-dim);font-size:14px;line-height:1.7;">Il log completo degli invii si trova nel foglio Google Sheets, tab <strong style="color:var(--amber);">Log</strong>.<br>Ogni riga registra: data/ora, task, destinatario, email, esito.</p>
  </div>`;
}

// ── FREQ UI ──
const FB_MAP={'giorni':['fb-giorni'],'settimane':['fb-settimane'],'mesi':['fb-mesi'],'giorno-fisso-mese':['fb-giorno-mese'],'giorno-settimana':['fb-giorno-sett'],'giorno-settimana-n':['fb-giorno-sett-n']};
const ALL_FB=['fb-giorni','fb-settimane','fb-mesi','fb-giorno-mese','fb-giorno-sett','fb-giorno-sett-n'];
function updateFreqUI(){
  const type=document.getElementById('task-freq-type').value;
  ALL_FB.forEach(id=>document.getElementById(id).classList.add('hidden'));
  (FB_MAP[type]||[]).forEach(id=>document.getElementById(id).classList.remove('hidden'));
}

// ── TASK MODAL ──
function openTaskModal(taskId) {
  const t=taskId?tasks.find(x=>x.id===taskId):null;
  document.getElementById('modal-task-title').textContent=t?'📋 Modifica task':'📋 Nuovo task';
  document.getElementById('task-id').value=t?t.id:'';
  document.getElementById('task-last-sent').value=t?(t.ultimoInvio?t.ultimoInvio.toISOString():''):'';
  document.getElementById('task-name').value=t?t.nome:'';
  document.getElementById('task-category').value=t?t.categoria:'Pulizie';
  document.getElementById('task-ora').value=t?(t.oraInvio||'09:00'):'09:00';
  document.getElementById('task-freq-type').value=t?t.freqType:'giorni';
  document.getElementById('fv-giorni').value=t?(t.freqValue||7):7;
  document.getElementById('fv-settimane').value=t?(t.freqValue||1):1;
  document.getElementById('fv-mesi').value=t?(t.freqValue||1):1;
  document.getElementById('fv-giorno-mese').value=t?(t.freqGiornoMese||4):4;
  document.getElementById('fv-giorno-sett').value=t?(t.freqGiornoSett||1):1;
  document.getElementById('fv-giorno-sett-n').value=t?(t.freqGiornoSett||1):1;
  document.getElementById('fv-sett-n').value=t?(t.freqValue||2):2;
  document.getElementById('task-note').value=t?t.note:'';
  document.getElementById('task-active').checked=t?t.attivo:true;
  const ps=document.getElementById('task-primary');
  const bs=document.getElementById('task-backup');
  ps.innerHTML='<option value="">— seleziona —</option>'+people.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('');
  bs.innerHTML='<option value="">— nessuno —</option>'+people.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('');
  if(t){ps.value=t.primaryId||'';bs.value=t.backupId||'';}
  updateFreqUI();
  document.getElementById('modal-task').classList.remove('hidden');
}

async function saveTask() {
  const id=document.getElementById('task-id').value;
  const lastSent=document.getElementById('task-last-sent').value;
  const freqType=document.getElementById('task-freq-type').value;
  const task={
    id:id||uid(), nome:document.getElementById('task-name').value.trim(),
    categoria:document.getElementById('task-category').value,
    oraInvio:document.getElementById('task-ora').value||'09:00',
    freqType, primaryId:document.getElementById('task-primary').value,
    backupId:document.getElementById('task-backup').value||'',
    note:document.getElementById('task-note').value.trim(),
    attivo:document.getElementById('task-active').checked,
    ultimoInvio:lastSent||'',
  };
  if(freqType==='giorni')           task.freqValue=parseInt(document.getElementById('fv-giorni').value)||1;
  if(freqType==='settimane')        task.freqValue=parseInt(document.getElementById('fv-settimane').value)||1;
  if(freqType==='mesi')             task.freqValue=parseInt(document.getElementById('fv-mesi').value)||1;
  if(freqType==='giorno-fisso-mese')task.freqGiornoMese=parseInt(document.getElementById('fv-giorno-mese').value)||4;
  if(freqType==='giorno-settimana') task.freqGiornoSett=parseInt(document.getElementById('fv-giorno-sett').value)||1;
  if(freqType==='giorno-settimana-n'){task.freqValue=parseInt(document.getElementById('fv-sett-n').value)||2;task.freqGiornoSett=parseInt(document.getElementById('fv-giorno-sett-n').value)||1;}
  if(!task.nome)return alert('Inserisci il nome della procedura.');
  closeModal('modal-task');
  try {
    await api('apiSaveTask', JSON.stringify(task));
    await loadAll();
    renderTab(currentTab);
    showToast('Task salvato ✓','ok');
  } catch(e){ showToast('Errore salvataggio','err'); }
}

async function deleteTask(id) {
  if(!confirm('Eliminare questo task?'))return;
  try {
    await api('apiDeleteTask', id);
    await loadAll();
    renderTasks();
    updateNavBadge();
    showToast('Task eliminato','ok');
  } catch(e){ showToast('Errore eliminazione','err'); }
}

// ── PERSON MODAL ──
function openPersonModal(personId) {
  const p=personId?people.find(x=>x.id===personId):null;
  document.getElementById('modal-person-title').textContent=p?'👤 Modifica persona':'👤 Nuova persona';
  document.getElementById('person-id').value=p?p.id:'';
  document.getElementById('person-name').value=p?p.nome:'';
  document.getElementById('person-whatsapp').value=p?p.whatsapp:'';
  document.getElementById('person-email').value=p?p.email:'';
  document.getElementById('modal-person').classList.remove('hidden');
}

async function savePerson() {
  const id=document.getElementById('person-id').value;
  const person={id:id||uid(),nome:document.getElementById('person-name').value.trim(),whatsapp:document.getElementById('person-whatsapp').value.trim(),email:document.getElementById('person-email').value.trim()};
  if(!person.nome)return alert('Inserisci il nome.');
  if(!person.email)return alert('Inserisci l\'email — è necessaria per i reminder automatici.');
  closeModal('modal-person');
  try {
    await api('apiSavePerson', JSON.stringify(person));
    await loadAll();
    renderPeople();
    showToast('Persona salvata ✓','ok');
  } catch(e){ showToast('Errore salvataggio','err'); }
}

async function deletePerson(id) {
  if(!confirm('Eliminare questa persona?'))return;
  try {
    await api('apiDeletePerson', id);
    await loadAll();
    renderPeople();
    showToast('Persona eliminata','ok');
  } catch(e){ showToast('Errore eliminazione','err'); }
}

// ── UTILS ──
function closeModal(id){document.getElementById(id).classList.add('hidden');}
['modal-task','modal-person'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModal(id);});
});

function showToast(msg, type='ok') {
  const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
</script>
